name: Release MovementLogger

# Fires whenever a semver tag `vX.Y.Z` is pushed.
# Typical release flow:
#
#   # bump version in stbox-viz-gui/Cargo.toml (and the other crates if desired)
#   git commit -am "Release MovementLogger v0.0.2" && git push
#   git tag v0.0.2 && git push origin v0.0.2
#
# This workflow builds release binaries for Linux x86_64, macOS arm64
# (Apple Silicon) and Windows x86_64, packages them, and attaches them
# to the GitHub Release that gets created for the tag.
#
# macOS Developer ID signing + notarization is automatic when these
# repository secrets are set (otherwise the .app/DMG ship unsigned and
# Gatekeeper requires right-click → Open on first launch):
#
#   MACOS_DEVELOPER_ID_CERTIFICATE           base64 of the .p12
#   MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD  password for the .p12
#   APPLE_API_KEY_P8                         base64 of the App Store Connect API key .p8
#   APPLE_API_KEY_ID                         e.g. ABCD1234EF
#   APPLE_API_ISSUER_ID                      e.g. 69a6de…-…
#
# The Mac App Store .pkg and Microsoft Store MSIX paths are intentionally
# omitted from this repo — port them from the upstream fp-sns-stbox1
# workflow if/when needed.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.0.1)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            binary-suffix: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            binary-suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            binary-suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # eframe needs xkbcommon + fontconfig + GL headers on Linux, and
      # btleplug (BLE FileSync) pulls in libdbus-sys for the BlueZ
      # backend → libdbus-1-dev. Without it the build dies in
      # libdbus-sys with "Package dbus-1 was not found".
      - name: install Linux GUI build deps
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libfontconfig1-dev libgl1-mesa-dev libdbus-1-dev

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} -p stbox-viz -p movement-logger

      - name: resolve tag / version
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          echo "stem=MovementLogger-$tag-${{ matrix.target }}" >> "$GITHUB_OUTPUT"

      - name: stage artifact contents
        shell: bash
        run: |
          set -euo pipefail
          stem="${{ steps.vars.outputs.stem }}"
          mkdir -p "dist/$stem"
          cp "target/${{ matrix.target }}/release/stbox-viz${{ matrix.binary-suffix }}"      "dist/$stem/"
          cp "target/${{ matrix.target }}/release/MovementLogger${{ matrix.binary-suffix }}" "dist/$stem/"
          cp README.md LICENSE "dist/$stem/" 2>/dev/null || true

      # Linux desktop integration — ship the .desktop, icon and tiny
      # installer next to the binary.
      - name: stage Linux desktop integration
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          stem="${{ steps.vars.outputs.stem }}"
          cp stbox-viz-gui/assets/MovementLogger.desktop "dist/$stem/"
          cp stbox-viz-gui/assets/icon.png               "dist/$stem/"
          cp stbox-viz-gui/assets/install-linux.sh       "dist/$stem/"
          chmod +x                                       "dist/$stem/install-linux.sh"

      # macOS .app bundle — wraps the GUI so Finder, Dock and Spotlight
      # pick up the icon and bundle metadata. Generates the .icns from
      # the source PNG via the native iconutil tool. stbox-viz CLI is
      # bundled into Contents/MacOS so MovementLogger's current_exe()-
      # relative lookup finds it.
      - name: build macOS .app bundle
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          stem="${{ steps.vars.outputs.stem }}"
          app="dist/${stem}/MovementLogger.app"
          mkdir -p "${app}/Contents/MacOS" "${app}/Contents/Resources"

          tmp_iconset="$(mktemp -d)/icon.iconset"
          mkdir -p "$tmp_iconset"
          for size in 16 32 64 128 256 512; do
            sips -z "$size" "$size" stbox-viz-gui/assets/icon.png \
              --out "$tmp_iconset/icon_${size}x${size}.png" >/dev/null
            dbl=$((size * 2))
            sips -z "$dbl" "$dbl" stbox-viz-gui/assets/icon.png \
              --out "$tmp_iconset/icon_${size}x${size}@2x.png" >/dev/null
          done
          iconutil -c icns "$tmp_iconset" -o "${app}/Contents/Resources/icon.icns"

          mv "dist/${stem}/MovementLogger" "${app}/Contents/MacOS/MovementLogger"
          cp "dist/${stem}/stbox-viz"      "${app}/Contents/MacOS/stbox-viz"
          chmod +x "${app}/Contents/MacOS/MovementLogger" \
                   "${app}/Contents/MacOS/stbox-viz"

          sed "s/__VERSION__/${version}/g" stbox-viz-gui/assets/Info.plist.template \
            > "${app}/Contents/Info.plist"

      # Sanity-check that the App-Store-blocking private symbol is gone
      # — proves the [patch.crates-io] winit-patched substitution held.
      - name: verify winit patch (macOS)
        if: contains(matrix.target, 'apple-darwin')
        run: |
          set -euo pipefail
          stem="${{ steps.vars.outputs.stem }}"
          if nm "dist/${stem}/MovementLogger.app/Contents/MacOS/MovementLogger" 2>/dev/null \
              | grep -q CGSSetWindowBackgroundBlur; then
            echo "ERROR: private _CGSSetWindowBackgroundBlurRadius symbol is back"
            echo "  → the [patch.crates-io] winit substitution didn't apply"
            exit 1
          fi

      # ---- Optional macOS code-signing + notarization ----
      # Runs only when the Developer ID secret is configured. Without it
      # the .app ships unsigned (first launch needs right-click → Open).
      - name: import macOS signing certificate
        if: contains(matrix.target, 'apple-darwin') && env.MACOS_DEVELOPER_ID_CERTIFICATE != ''
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          security create-keychain -p "" build.keychain
          security set-keychain-settings build.keychain
          security list-keychains -d user -s build.keychain
          echo "$MACOS_DEVELOPER_ID_CERTIFICATE" | base64 --decode > devid.p12
          security import devid.p12 -k build.keychain \
            -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productbuild
          rm devid.p12
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

      - name: codesign .app (Developer ID)
        if: contains(matrix.target, 'apple-darwin') && env.MACOS_DEVELOPER_ID_CERTIFICATE != ''
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
        run: |
          set -euo pipefail
          stem="${{ steps.vars.outputs.stem }}"
          app="dist/${stem}/MovementLogger.app"
          identity=$(security find-identity -v build.keychain \
            | grep "Developer ID Application" | head -1 \
            | sed 's/.*"\(.*\)"/\1/' || true)
          if [ -z "$identity" ]; then
            echo "WARNING: cert imported but no Developer ID identity surfaced — skipping signing"
            exit 0
          fi
          codesign --force --options runtime --sign "$identity" \
            --entitlements stbox-viz-gui/entitlements.plist \
            "$app/Contents/MacOS/stbox-viz"
          codesign --force --options runtime --sign "$identity" \
            --entitlements stbox-viz-gui/entitlements.plist \
            --deep "$app"

      # Notarize and staple the .app BEFORE building the DMG so launches
      # work offline — see upstream fp-sns-stbox1 v0.1.6 release notes
      # for the field-test bug that motivated this.
      - name: notarize + staple .app
        if: contains(matrix.target, 'apple-darwin') && env.APPLE_API_KEY_P8 != '' && env.MACOS_DEVELOPER_ID_CERTIFICATE != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
        run: |
          set -euo pipefail
          stem="${{ steps.vars.outputs.stem }}"
          app="dist/${stem}/MovementLogger.app"
          mkdir -p ~/.private_keys
          echo "$APPLE_API_KEY_P8" | base64 --decode \
            > ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8
          ditto -c -k --keepParent "$app" MovementLogger.app.zip
          xcrun notarytool submit MovementLogger.app.zip \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$app"
          rm -f MovementLogger.app.zip
          spctl -a -vvv --type execute "$app"

      - name: build DMG (macOS)
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          stem="${{ steps.vars.outputs.stem }}"
          staging=$(mktemp -d)
          cp -R "dist/${stem}/MovementLogger.app" "$staging/"
          ln -s /Applications "$staging/Applications"
          hdiutil create -volname "MovementLogger" \
            -srcfolder "$staging" \
            -ov -format UDZO \
            "dist/MovementLogger-${version}-macos-aarch64.dmg"
          rm -rf "$staging"

      - name: notarize + staple DMG
        if: contains(matrix.target, 'apple-darwin') && env.APPLE_API_KEY_P8 != '' && env.MACOS_DEVELOPER_ID_CERTIFICATE != ''
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          MACOS_DEVELOPER_ID_CERTIFICATE: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE }}
        run: |
          set -euo pipefail
          version="${{ steps.vars.outputs.version }}"
          dmg="dist/MovementLogger-${version}-macos-aarch64.dmg"
          xcrun notarytool submit "$dmg" \
            --key ~/.private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$dmg"

      - name: pack tar.gz
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar czf "${{ steps.vars.outputs.stem }}.tar.gz" "${{ steps.vars.outputs.stem }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ steps.vars.outputs.stem }}.tar.gz" > "${{ steps.vars.outputs.stem }}.tar.gz.sha256"
          else
            shasum -a 256 "${{ steps.vars.outputs.stem }}.tar.gz" > "${{ steps.vars.outputs.stem }}.tar.gz.sha256"
          fi

      - name: pack zip (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ steps.vars.outputs.stem }}" -DestinationPath "${{ steps.vars.outputs.stem }}.zip"
          (Get-FileHash "${{ steps.vars.outputs.stem }}.zip" -Algorithm SHA256).Hash.ToLower() + "  ${{ steps.vars.outputs.stem }}.zip" | Out-File -Encoding ASCII "${{ steps.vars.outputs.stem }}.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.vars.outputs.stem }}
          path: |
            dist/${{ steps.vars.outputs.stem }}.tar.gz
            dist/${{ steps.vars.outputs.stem }}.tar.gz.sha256
            dist/${{ steps.vars.outputs.stem }}.zip
            dist/${{ steps.vars.outputs.stem }}.zip.sha256
            dist/MovementLogger-*-macos-aarch64.dmg
          if-no-files-found: ignore
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list collected artifacts
        run: ls -la artifacts

      - name: resolve tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: MovementLogger ${{ steps.vars.outputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.tar.gz.sha256
            artifacts/*.zip
            artifacts/*.zip.sha256
            artifacts/*.dmg
